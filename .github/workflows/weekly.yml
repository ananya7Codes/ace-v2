name: Weekly Tweet Pipeline

on:
  schedule:
    - cron: '0 9 * * 5'  # Fridays 09:00 UTC
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure env
        run: |
          echo "X_API_KEY=${{ secrets.X_API_KEY }}" >> $GITHUB_ENV
          echo "X_API_SECRET=${{ secrets.X_API_SECRET }}" >> $GITHUB_ENV
          echo "X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}" >> $GITHUB_ENV
          echo "X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}" >> $GITHUB_ENV

      - name: Ingest RSS feeds
        run: python scripts/ingest.py

      - name: Process and rank stories
        run: python scripts/process.py

      - name: Tweet top 5
        run: python scripts/tweet.py
