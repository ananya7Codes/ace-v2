name: Weekly Tweet Pipeline

on:
  schedule:
    - cron: '0 9 * * 5'  # Fridays 09:00 UTC
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest RSS feeds
        run: python scripts/ingest.py

      - name: Process and rank stories
        run: python scripts/process.py

      - name: Generate tweet files
        run: python scripts/tweet.py

      - name: Commit tweet files to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "No new tweets to commit."
          else
            DATE=$(date -u +'%Y-%m-%d')
            git commit -m "tweets: $DATE"
            git push
          fi
